name: MMB Markdown Math

on:
  pull_request:
    paths:
      - "mmb-paper-derivations/**/*.md"
      - "scripts/check_mmb_markdown_math.py"
      - "scripts/convert_mmb_math_delimiters.py"
      - ".github/workflows/mmb-markdown-math.yml"
  push:
    branches:
      - main
    paths:
      - "mmb-paper-derivations/**/*.md"
      - "scripts/check_mmb_markdown_math.py"
      - "scripts/convert_mmb_math_delimiters.py"
      - ".github/workflows/mmb-markdown-math.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/check_mmb_markdown_math.py
